workflows:
  # ── Android: build + sign only (no Play Store upload) ──
  android-signed:
    name: Android Signed APK
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 21
      android_signing:
        - android-key-lm
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Set up key.properties
        script: |
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Build signed APKs
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*-release.apk
    publishing:
      email:
        recipients:
          - pierregallaz@gmail.com
        notify:
          success: true
          failure: true

  # ── Android: build, sign + publish to Google Play ──
  android-release:
    name: Android Play Store Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 21
      android_signing:
        - android-key-lm
      groups:
        - google_play_credentials
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Set up key.properties
        script: |
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: beta
        changes_not_sent_for_review: true
