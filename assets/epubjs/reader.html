<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #ffffff;
    color: #000000;
    transition: none;
  }
  body.dark {
    background: #121212;
    color: #f5f5f5;
  }
  #viewer {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: sans-serif;
    font-size: 16px;
    color: #888;
    z-index: 5;
  }
  .tap-zone {
    position: fixed;
    top: 0;
    height: 100%;
    z-index: 20;
    background: transparent;
  }
  #tap-prev { left: 0; width: 30%; }
  #tap-next { right: 0; width: 30%; }
</style>
<script src="jszip.min.js"></script>
<script src="epub.min.js"></script>
</head>
<body>
<div id="viewer"></div>
<div id="loading">Loading...</div>
<div id="tap-prev" class="tap-zone"></div>
<div id="tap-next" class="tap-zone"></div>
<script>
var book = null;
var rendition = null;
var currentCfi = null;
var isNavigating = false;
var currentFontSize = 18;
var isDarkTheme = false;

document.getElementById("tap-prev").addEventListener("click", function(e) {
  e.preventDefault(); e.stopPropagation(); goPrev();
});
document.getElementById("tap-next").addEventListener("click", function(e) {
  e.preventDefault(); e.stopPropagation(); goNext();
});
document.getElementById("tap-prev").addEventListener("touchend", function(e) {
  e.preventDefault(); goPrev();
});
document.getElementById("tap-next").addEventListener("touchend", function(e) {
  e.preventDefault(); goNext();
});

function loadBook(base64Data) {
  try {
    var raw = atob(base64Data);
    var len = raw.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) {
      bytes[i] = raw.charCodeAt(i);
    }

    book = ePub(bytes.buffer);
    rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      flow: "paginated",
      spread: "none",
      allowScriptedContent: true
    });

    rendition.on("relocated", function(location) {
      currentCfi = location.start.cfi;
      isNavigating = false;
      var progress = book.locations ? (location.start.percentage || 0) : 0;
      try {
        window.flutter_inappwebview.callHandler("onRelocated", currentCfi, progress);
      } catch(e) {}
    });

    // Inject theme + font size CSS into every iframe content load.
    // Uses !important to override any inline styles from the EPUB.
    rendition.hooks.content.register(function(contents) {
      injectStyles(contents);
      // Tap handler for middle area
      contents.document.addEventListener("click", function(e) {
        var iframeWidth = contents.document.documentElement.clientWidth;
        var x = e.clientX;
        if (x < iframeWidth * 0.3) { goPrev(); }
        else if (x > iframeWidth * 0.7) { goNext(); }
      });
    });

    book.ready.then(function() {
      document.getElementById("loading").style.display = "none";

      var tocData = [];
      if (book.navigation && book.navigation.toc) {
        book.navigation.toc.forEach(function(item) {
          tocData.push({ label: item.label.trim(), href: item.href });
          if (item.subitems) {
            item.subitems.forEach(function(sub) {
              tocData.push({ label: "  " + sub.label.trim(), href: sub.href });
            });
          }
        });
      }
      try {
        window.flutter_inappwebview.callHandler("onBookReady", JSON.stringify(tocData));
      } catch(e) {}

      book.locations.generate(1600).then(function() {
        if (currentCfi) {
          try { window.flutter_inappwebview.callHandler("onLocationsReady"); } catch(e) {}
        }
      });
    });

    rendition.display();
  } catch(e) {
    document.getElementById("loading").textContent = "Error: " + e.message;
  }
}

// Inject CSS into an epub.js contents object to force theme + font size.
// Removes any previously injected style first, so theme switches take effect.
function injectStyles(contents) {
  var css;
  if (isDarkTheme) {
    css = "body, p, div, span, h1, h2, h3, h4, h5, h6, a, li, td, th, blockquote, em, strong, b, i, u, small, big, sub, sup, pre, code, figcaption, cite, dt, dd, label, section, article, aside, header, footer, nav, main { color: #f5f5f5 !important; } body, html { background-color: #121212 !important; } img { opacity: 0.85; }";
  } else {
    css = "body, p, div, span, h1, h2, h3, h4, h5, h6, a, li, td, th, blockquote, em, strong, b, i, u, small, big, sub, sup, pre, code, figcaption, cite, dt, dd, label, section, article, aside, header, footer, nav, main { color: #000000 !important; } body, html { background-color: #ffffff !important; }";
  }
  css += " body, p, div, span, li, td, th, blockquote, pre, code, figcaption, cite, dt, dd { font-size: " + currentFontSize + "px !important; line-height: 1.6 !important; }";

  // Remove any previously injected style element so old theme CSS doesn't linger
  try {
    var doc = contents.document;
    var old = doc.getElementById("epubjs-injected-theme");
    if (old) old.remove();
    var style = doc.createElement("style");
    style.id = "epubjs-injected-theme";
    style.textContent = css;
    doc.head.appendChild(style);
  } catch(e) {
    // Fallback to addStylesheet if direct DOM access fails
    contents.addStylesheet(css);
  }
}

// Re-apply styles to all currently loaded contents
function reapplyStyles() {
  if (!rendition) return;
  var allContents = rendition.getContents();
  for (var i = 0; i < allContents.length; i++) {
    injectStyles(allContents[i]);
  }
}

function goNext() {
  if (rendition && !isNavigating) {
    isNavigating = true;
    rendition.next().then(function() { isNavigating = false; }).catch(function() { isNavigating = false; });
  }
}

function goPrev() {
  if (rendition && !isNavigating) {
    isNavigating = true;
    rendition.prev().then(function() { isNavigating = false; }).catch(function() { isNavigating = false; });
  }
}

function goToCfi(cfi) {
  if (rendition && cfi) rendition.display(cfi);
}

function goToHref(href) {
  if (rendition && href) rendition.display(href);
}

function setFontSize(px) {
  currentFontSize = px;
  if (rendition) {
    rendition.themes.fontSize(px + "px");
    reapplyStyles();
  }
}

function changeFontSize(delta) {
  var newSize = Math.max(10, Math.min(40, currentFontSize + delta));
  setFontSize(newSize);
  return newSize;
}

function setTheme(dark) {
  isDarkTheme = dark;
  if (dark) {
    document.body.classList.add("dark");
  } else {
    document.body.classList.remove("dark");
  }
  if (rendition) {
    reapplyStyles();
  }
}

function getCurrentCfi() {
  return currentCfi || "";
}
</script>
</body>
</html>
